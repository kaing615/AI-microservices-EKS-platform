name: CD GitOps

on:
  workflow_dispatch:
  push:
    branches: ["main", "feat/**"]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push all images
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Frontend
          docker build -t $ECR_REGISTRY/ai-platform-dev/frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/ai-platform-dev/frontend:$IMAGE_TAG
          
          # API Gateway
          docker build -t $ECR_REGISTRY/ai-platform-dev/api-gateway:$IMAGE_TAG ./api-gateway
          docker push $ECR_REGISTRY/ai-platform-dev/api-gateway:$IMAGE_TAG
          
          # Auth Service
          docker build -t $ECR_REGISTRY/ai-platform-dev/auth-service:$IMAGE_TAG ./auth-service
          docker push $ECR_REGISTRY/ai-platform-dev/auth-service:$IMAGE_TAG
          
          # Prediction Service
          docker build -t $ECR_REGISTRY/ai-platform-dev/prediction-service:$IMAGE_TAG ./prediction-service
          docker push $ECR_REGISTRY/ai-platform-dev/prediction-service:$IMAGE_TAG
          
          # AI Inference Service
          docker build -t $ECR_REGISTRY/ai-platform-dev/ai-inference-service:$IMAGE_TAG ./ai-inference-service
          docker push $ECR_REGISTRY/ai-platform-dev/ai-inference-service:$IMAGE_TAG
          
          echo "All images pushed successfully!"

      - name: Update Helm values with image tags
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Update image tags in values.yaml
          sed -i "s/tag: latest/tag: $IMAGE_TAG/g" helm/ai-platform/values.yaml

      - name: Commit updated values
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add helm/ai-platform/values.yaml
          git diff --staged --quiet || git commit -m "chore: update helm image tags to ${{ github.sha }}"
          git push