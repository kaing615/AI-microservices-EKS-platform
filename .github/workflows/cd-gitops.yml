name: CD GitOps

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push api-gateway image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/api-gateway:$IMAGE_TAG ./api-gateway
          docker push $ECR_REGISTRY/api-gateway:$IMAGE_TAG

      - name: Placeholder for manifest update
        run: |
          echo "Update overlay image tags here or in a separate GitOps repository."
          echo "Then let ArgoCD sync the new revision."

