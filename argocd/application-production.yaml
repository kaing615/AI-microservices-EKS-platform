apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-platform-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kaing615/AI-microservices-EKS-platform.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
