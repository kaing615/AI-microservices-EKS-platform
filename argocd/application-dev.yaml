apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-platform-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kaing615/AI-microservices-EKS-platform.git
    targetRevision: develop
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
