namespace:
  create: false

secret:
  jwtSecret: "replace-me-with-external-secret"

ingress:
  enabled: true
  host: app.example.com
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:123456789012:certificate/replace-me

services:
  frontend:
    replicaCount: 2
  apiGateway:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      averageUtilization: 70
  authService:
    replicaCount: 2
    persistence:
      size: 1Gi
      storageClassName: gp3
  predictionService:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      averageUtilization: 70
    persistence:
      size: 2Gi
      storageClassName: gp3
  aiInferenceService:
    replicaCount: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      averageUtilization: 70
