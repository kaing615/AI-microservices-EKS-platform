{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.hpa $service.hpa.enabled }}
{{- $componentName := include "ai-platform.componentName" $name }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $componentName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "ai-platform.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
    {{- include "ai-platform.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $componentName }}
  minReplicas: {{ $service.hpa.minReplicas }}
  maxReplicas: {{ $service.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $service.hpa.averageUtilization }}
{{- end }}
{{- end }}
